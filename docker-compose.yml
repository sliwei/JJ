services:
  jj-serve:
    restart: always
    container_name: jj-serve
    image: registry.cn-shenzhen.aliyuncs.com/sliwei/jj-serve:$TAG
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
      - APP_PORT=8080
      # 数据库配置（Bili Monitor功能需要）
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    # ports:
    #   - "8080:8080"
    volumes:
      - ./logs:/app/logs
    networks:
      - proxy

networks:
  proxy:
    external: true
